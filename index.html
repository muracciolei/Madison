<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#4f46e5">
  <meta name="description" content="Madison - Your voice-powered search assistant">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect fill='%234f46e5' width='180' height='180' rx='30'/><path d='M45 90C45 90 52 60 90 60C128 60 135 90 135 90C135 90 128 120 90 120C52 120 45 90 45 90Z' fill='white'/><path d='M60 90C60 90 67 75 90 75C113 75 120 90 120 90' stroke='%234f46e5' stroke-width='3' stroke-linecap='round'/><circle cx='75' cy='90' r='7' fill='%234f46e5'/></svg>">
  <title>Madison - OpenData Voice Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌊</text></svg>">
</head>
<body>
  <div id="app">
    <header class="header">
      <div class="logo">
        <svg class="logo-icon" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M4 16C4 16 8 8 16 8C24 8 28 16 28 16C28 16 24 24 16 24C8 24 4 16 4 16Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M8 16C8 16 11 12 16 12C21 12 24 16 24 16" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="12" cy="16" r="2" fill="currentColor"/>
        </svg>
        <span class="logo-text">Madison</span>
      </div>
      <div class="header-actions">
        <button id="speed-btn" class="icon-btn" title="Voice speed">
          <span class="speed-label">1x</span>
        </button>
        <button id="theme-btn" class="icon-btn" title="Toggle theme">
          <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="5"/>
            <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
          </svg>
          <svg class="moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        </button>
      </div>
    </header>

    <main class="chat-container">
      <div id="chat-messages" class="chat-messages">
        <div class="welcome-message">
          <div class="bot-avatar">
            <svg viewBox="0 0 32 32" fill="none">
              <circle cx="16" cy="16" r="14" fill="var(--accent)"/>
              <path d="M10 16l4 4 8-8" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <div class="welcome-content">
            <h2>Ask Madison</h2>
            <p>Your voice-powered search assistant. Ask me about:</p>
            <ul class="feature-list">
              <li>🌤️ Weather in any city</li>
              <li>📚 Wikipedia topics</li>
              <li>📰 Latest news</li>
              <li>🚀 NASA space updates</li>
              <li>💱 Currency exchange rates</li>
              <li>📖 Word definitions</li>
            </ul>
            <p class="hint">Try: "weather in London" or "what is artificial intelligence"</p>
          </div>
        </div>
      </div>

      <div class="typing-indicator" id="typing-indicator" style="display: none;">
        <div class="bot-avatar">
          <svg viewBox="0 0 32 32" fill="none">
            <circle cx="16" cy="16" r="14" fill="var(--accent)"/>
            <circle cx="10" cy="14" r="2" fill="white"/>
            <circle cx="16" cy="14" r="2" fill="white"/>
            <circle cx="22" cy="14" r="2" fill="white"/>
          </svg>
        </div>
        <div class="typing-dots">
          <span></span><span></span><span></span>
        </div>
      </div>
    </main>

    <footer class="input-area">
      <div class="input-container">
        <button id="clear-btn" class="icon-btn secondary" title="Clear chat">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="3 6 5 6 21 6"/>
            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
          </svg>
        </button>
        
        <div class="input-wrapper">
          <input 
            type="text" 
            id="user-input" 
            placeholder="Type your question..." 
            autocomplete="off"
            enterkeyhint="send"
          >
        </div>

        <button id="mic-btn" class="icon-btn voice" title="Voice input">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
            <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
            <line x1="12" y1="19" x2="12" y2="23"/>
            <line x1="8" y1="23" x2="16" y2="23"/>
          </svg>
        </button>

        <button id="speak-btn" class="icon-btn secondary" title="Toggle auto-speak">
          <svg class="volume-on" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
            <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/>
          </svg>
          <svg class="volume-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
            <line x1="23" y1="9" x2="17" y2="15"/>
            <line x1="17" y1="9" x2="23" y2="15"/>
          </svg>
        </button>

        <button id="send-btn" class="send-btn" title="Send message">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
    </footer>

    <div id="speed-menu" class="speed-menu hidden">
      <button data-speed="0.5">0.5x</button>
      <button data-speed="0.75">0.75x</button>
      <button data-speed="1" class="active">1x</button>
      <button data-speed="1.25">1.25x</button>
      <button data-speed="1.5">1.5x</button>
      <button data-speed="2">2x</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
