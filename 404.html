<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found · Madison</title>
  <link rel="stylesheet" href="/styles.css">
  <style>
    body { display: flex; align-items: center; justify-content: center; height: 100vh; overflow: auto; }
    .not-found {
      text-align: center;
      padding: 40px 24px;
      max-width: 400px;
    }
    .not-found svg { width: 64px; height: 64px; color: var(--accent); margin-bottom: 16px; }
    .not-found h1 { font-family: 'DM Sans', sans-serif; font-size: 28px; margin-bottom: 8px; }
    .not-found p { color: var(--text-secondary); margin-bottom: 24px; }
    .not-found a {
      display: inline-block;
      padding: 12px 28px;
      background: var(--accent);
      color: white;
      border-radius: 24px;
      text-decoration: none;
      font-weight: 600;
      transition: background 0.2s;
    }
    .not-found a:hover { background: var(--accent-hover); }
    .not-found a:focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; }
  </style>
</head>
<body>
  <div class="not-found">
    <svg viewBox="0 0 32 32" fill="none" aria-hidden="true">
      <circle cx="16" cy="16" r="14" fill="var(--accent)"/>
      <path d="M10 16l4 4 8-8" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <h1>Page Not Found</h1>
    <p>The page you're looking for doesn't exist. Let's get you back to Madison.</p>
    <a href="/">Go to Madison</a>
  </div>
  <script>
    const saved = localStorage.getItem('madison-theme');
    const dark = saved === 'dark' || (!saved && window.matchMedia('(prefers-color-scheme: dark)').matches);
    if (dark) document.documentElement.setAttribute('data-theme', 'dark');
  </script>
</body>
</html>
